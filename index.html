    const eX = barX;
    const eY = barY + 46;
    const eW = barW;
    const eH = 16;
    ctx.fillStyle = "rgba(8,14,26,0.65)";
    ctx.beginPath();
    ctx.roundRect(eX, eY, eW, eH, 8);
    ctx.fill();

    const enT = launcher.energy / launcher.energyMax;
    const eGrad = ctx.createLinearGradient(eX, eY, eX + eW, eY);
    eGrad.addColorStop(0, "#74b9ff");
    eGrad.addColorStop(1, "#c8f0ff");
    ctx.fillStyle = eGrad;
    ctx.beginPath();
    ctx.roundRect(eX + 2, eY + 2, (eW - 4) * enT, eH - 4, 7);
    ctx.fill();

    ctx.fillStyle = "rgba(220,235,255,0.9)";
    ctx.font = "600 12px Inter, Arial";
    ctx.fillText("ЗАРЯД УСТАНОВКИ", eX, eY - 7);

    const mapW = 190;
    const mapH = 92;
    const mapX = W - mapW - 24;
    const mapY = 22;

    ctx.fillStyle = "rgba(8,14,26,0.65)";
    ctx.beginPath();
    ctx.roundRect(mapX, mapY, mapW, mapH, 18);
    ctx.fill();
    ctx.strokeStyle = "rgba(120,170,255,0.18)";
    ctx.beginPath();
    ctx.roundRect(mapX, mapY, mapW, mapH, 18);
    ctx.stroke();

    const sx = mapW / W;
    const sy = mapH / H;

    ctx.fillStyle = "rgba(80,110,180,0.18)";
    ctx.fillRect(mapX + 8, mapY + mapH * 0.6, mapW - 16, 2);

    for (const b of city) {
      ctx.fillStyle = b.alive ? "rgba(130,210,255,0.7)" : "rgba(255,100,80,0.28)";
      ctx.fillRect(mapX + b.x * sx, mapY + b.y * sy, Math.max(2, b.w * sx), Math.max(2, b.h * sy));
    }
    for (const m of missiles) {
      ctx.fillStyle = m.type === "cluster" ? "rgba(210,120,255,0.95)" : "rgba(255,120,90,0.95)";
      ctx.fillRect(mapX + m.x * sx, mapY + m.y * sy, 2.5, 2.5);
    }
    for (const d of drones) {
      ctx.fillStyle = "rgba(255,170,100,0.95)";
      ctx.fillRect(mapX + d.x * sx, mapY + d.y * sy, 3, 2);
    }
    ctx.fillStyle = "rgba(150,235,255,1)";
    ctx.beginPath();
    ctx.arc(mapX + launcher.x * sx, mapY + launcher.y * sy, 3.5, 0, TAU);
    ctx.fill();

    ctx.fillStyle = "rgba(220,235,255,0.95)";
    ctx.font = "700 12px Inter, Arial";
    ctx.fillText("ТАКТИЧЕСКИЙ ОБЗОР", mapX + 12, mapY + 16);

    const effectsX = W - 260;
    const effectsY = mapY + mapH + 14;
    const active = [];
    if (effects.infiniteAmmo > 0) active.push(["∞ ПАТРОНЫ", effects.infiniteAmmo, "#9fe8ff"]);
    if (effects.powerShot > 0) active.push(["СИЛЬНЫЙ УДАР", effects.powerShot, "#ffd48a"]);
    if (effects.slowTime > 0) active.push(["ЗАМЕДЛЕНИЕ", effects.slowTime, "#a7c3ff"]);
    if (effects.shieldDrones > 0) active.push(["ДРОНЫ-ЩИТЫ", effects.shieldDrones, "#75e4ff"]);
    if (effects.splitShot > 0) active.push(["РАЗДВОЕНИЕ", effects.splitShot, "#ffb9ff"]);

    if (active.length) {
      ctx.fillStyle = "rgba(8,14,26,0.65)";
      ctx.beginPath();
      ctx.roundRect(effectsX, effectsY, 236, 22 + active.length * 22, 16);
      ctx.fill();
      ctx.strokeStyle = "rgba(120,170,255,0.18)";
      ctx.beginPath();
      ctx.roundRect(effectsX, effectsY, 236, 22 + active.length * 22, 16);
      ctx.stroke();
      ctx.fillStyle = "rgba(220,235,255,0.95)";
      ctx.font = "700 12px Inter, Arial";
      ctx.fillText("АКТИВНЫЕ БОНУСЫ", effectsX + 12, effectsY + 15);
      active.forEach((a, i) => {
        ctx.fillStyle = a[2];
        ctx.font = "700 12px Inter, Arial";
        ctx.fillText(a[0], effectsX + 12, effectsY + 36 + i * 22);
        ctx.fillStyle = "rgba(230,240,255,0.95)";
        ctx.fillText(a[1].toFixed(1) + " c", effectsX + 162, effectsY + 36 + i * 22);
      });
    }

    pauseButton.w = 54;
    pauseButton.h = 54;
    pauseButton.x = W - pauseButton.w - 24;
    pauseButton.y = H - pauseButton.h - 20;

    ctx.fillStyle = "rgba(8,14,26,0.72)";
    ctx.beginPath();
    ctx.roundRect(pauseButton.x, pauseButton.y, pauseButton.w, pauseButton.h, 16);
    ctx.fill();
    ctx.strokeStyle = "rgba(120,170,255,0.18)";
    ctx.beginPath();
    ctx.roundRect(pauseButton.x, pauseButton.y, pauseButton.w, pauseButton.h, 16);
    ctx.stroke();
    ctx.fillStyle = "rgba(225,240,255,0.95)";
    if (paused) {
      ctx.beginPath();
      ctx.moveTo(pauseButton.x + 20, pauseButton.y + 15);
      ctx.lineTo(pauseButton.x + 20, pauseButton.y + 39);
      ctx.lineTo(pauseButton.x + 38, pauseButton.y + 27);
      ctx.closePath();
      ctx.fill();
    } else {
      ctx.fillRect(pauseButton.x + 18, pauseButton.y + 14, 6, 26);
      ctx.fillRect(pauseButton.x + 30, pauseButton.y + 14, 6, 26);
    }

    ctx.fillStyle = "rgba(215,230,255,0.72)";
    ctx.font = "600 13px Inter, Arial";
    const bottomHint = window.innerWidth < 900 ? "Касание — огонь   •   кнопка справа снизу — пауза   •   бонусы подбираются выстрелом" : "ЛКМ — огонь   •   ESC / P — пауза   •   бонусы подбираются выстрелом";
    ctx.fillText(bottomHint, 26, H - 18);

    ctx.restore();
  }

  function drawFloatingTexts() {
    ctx.save();
    ctx.textAlign = "center";
    for (const f of floatingTexts) {
      const a = clamp(f.life / f.maxLife, 0, 1);
      ctx.globalAlpha = a;
      glowCircle(f.x, f.y - 4, Math.max(36, f.size * 1.7), `rgba(255,255,255,ALPHA)`, 0.04 + a * 0.04);
      drawTextShadow(f.text, f.x, f.y, `900 ${f.size}px Inter, Arial`, f.color, "rgba(0,0,0,0.52)", 0, 3);
    }
    ctx.globalAlpha = 1;
    ctx.textAlign = "start";
    ctx.restore();
  }

  function drawCrosshair() {
    const x = mouse.x;
    const y = mouse.y;
    const active = state === "playing" && !paused;
    ctx.save();
    ctx.strokeStyle = active ? "rgba(150,235,255,0.85)" : "rgba(180,180,180,0.45)";
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.arc(x, y, 14, 0, TAU);
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(x - 22, y);
    ctx.lineTo(x - 8, y);
    ctx.moveTo(x + 8, y);
    ctx.lineTo(x + 22, y);
    ctx.moveTo(x, y - 22);
    ctx.lineTo(x, y - 8);
    ctx.moveTo(x, y + 8);
    ctx.lineTo(x, y + 22);
    ctx.stroke();

    glowCircle(x, y, 18, active ? "rgba(120,220,255,ALPHA)" : "rgba(180,180,180,ALPHA)", 0.07);
    ctx.restore();
  }

  function drawOrientationPrompt() {
    if (!isPortraitPhone()) return;
    ctx.fillStyle = "rgba(2,4,8,0.84)";
    ctx.fillRect(0, 0, W, H);
    ctx.save();
    ctx.translate(W * 0.5, H * 0.5 - 28);
    ctx.rotate(-Math.PI / 2);
    ctx.strokeStyle = "rgba(150,220,255,0.95)";
    ctx.lineWidth = 4;
    ctx.beginPath();
    ctx.roundRect(-42, -24, 84, 48, 12);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(36, 0);
    ctx.lineTo(58, 0);
    ctx.stroke();
    ctx.fillStyle = "rgba(150,220,255,0.95)";
    ctx.beginPath();
    ctx.moveTo(60, 0);
    ctx.lineTo(48, -8);
    ctx.lineTo(48, 8);
    ctx.closePath();
    ctx.fill();
    ctx.restore();

    ctx.textAlign = "center";
    drawTextShadow("ПОВЕРНИ ТЕЛЕФОН", W * 0.5, H * 0.5 + 42, "800 34px Inter, Arial", "rgba(240,248,255,0.98)");
    ctx.fillStyle = "rgba(190,210,230,0.92)";
    ctx.font = "600 18px Inter, Arial";
    ctx.fillText("Для игры нужен горизонтальный режим", W * 0.5, H * 0.5 + 72);
    ctx.textAlign = "start";
  }

  function drawTitle() {
    ctx.save();

    const overlay = ctx.createLinearGradient(0, 0, 0, H);
    overlay.addColorStop(0, "rgba(3,8,18,0.15)");
    overlay.addColorStop(1, "rgba(1,2,5,0.58)");
    ctx.fillStyle = overlay;
    ctx.fillRect(0, 0, W, H);

    const cx = W * 0.5;
    const cy = H * 0.28;

    glowCircle(cx, cy, 170, "rgba(90,160,255,ALPHA)", 0.14);

    ctx.textAlign = "center";
    drawTextShadow("NIGHT SHIELD DELUXE", cx, cy, `800 ${Math.floor(Math.min(W, H) * 0.062)}px Inter, Arial`, "rgba(240,248,255,0.98)");
    ctx.fillStyle = "rgba(170,205,235,0.92)";
    ctx.font = `600 ${Math.floor(Math.min(W, H) * 0.022)}px Inter, Arial`;
    ctx.fillText("Оборона города от ракет, дронов и кассетных угроз", cx, cy + 44);

    const boxW = Math.min(680, W * 0.78);
    const boxH = 190;
    const bx = cx - boxW / 2;
    const by = H * 0.48;

    ctx.fillStyle = "rgba(8,14,26,0.62)";
    ctx.beginPath();
    ctx.roundRect(bx, by, boxW, boxH, 24);
    ctx.fill();
    ctx.strokeStyle = "rgba(120,170,255,0.18)";
    ctx.beginPath();
    ctx.roundRect(bx, by, boxW, boxH, 24);
    ctx.stroke();

    ctx.fillStyle = "rgba(232,242,255,0.94)";
    ctx.font = "700 20px Inter, Arial";
    ctx.fillText("Защищай город, подрывай угрозы и перехватывай бонусы", cx, by + 38);

    ctx.fillStyle = "rgba(185,205,225,0.9)";
    ctx.font = "500 16px Inter, Arial";
    ctx.fillText("Обычные ракеты, кассетные угрозы, беспилотники, бомбы и парашютные бустеры.", cx, by + 72);
    ctx.fillText("Волны становятся опаснее, а сцена живёт своим циклом дня и ночи.", cx, by + 98);

    const pulse = 0.55 + Math.sin(time * 3.5) * 0.22;
    ctx.fillStyle = `rgba(120,220,255,${pulse})`;
    ctx.beginPath();
    ctx.roundRect(cx - 110, by + 130, 220, 32, 14);
    ctx.fill();

    ctx.fillStyle = "#021017";
    ctx.font = "800 15px Inter, Arial";
    ctx.fillText(window.innerWidth < 900 ? "КАСАНИЕ ДЛЯ СТАРТА" : "ENTER / КЛИК ДЛЯ СТАРТА", cx, by + 152);

    ctx.textAlign = "start";
    ctx.restore();
  }

  function drawPause() {
    ctx.fillStyle = "rgba(2,4,8,0.38)";
    ctx.fillRect(0, 0, W, H);
    ctx.textAlign = "center";
    drawTextShadow("ПАУЗА", W / 2, H / 2 - 10, "800 54px Inter, Arial", "rgba(240,248,255,0.96)");
    ctx.fillStyle = "rgba(180,205,225,0.88)";
    ctx.font = "600 18px Inter, Arial";
    ctx.fillText(window.innerWidth < 900 ? "Нажми кнопку паузы, чтобы продолжить" : "Нажми ESC / P, чтобы продолжить оборону", W / 2, H / 2 + 28);
    ctx.textAlign = "start";
  }

  function drawGameOver() {
    ctx.fillStyle = "rgba(2,4,8,0.56)";
    ctx.fillRect(0, 0, W, H);

    const boxW = Math.min(560, W * 0.74);
    const boxH = 270;
    const x = W / 2 - boxW / 2;
    const y = H / 2 - boxH / 2;

    ctx.fillStyle = "rgba(8,14,26,0.78)";
    ctx.beginPath();
    ctx.roundRect(x, y, boxW, boxH, 26);
    ctx.fill();
    ctx.strokeStyle = "rgba(255,120,100,0.2)";
    ctx.lineWidth = 1.2;
    ctx.beginPath();
    ctx.roundRect(x, y, boxW, boxH, 26);
    ctx.stroke();

    ctx.textAlign = "center";
    glowCircle(W / 2, y + 54, 110, "rgba(255,100,80,ALPHA)", 0.12);
    drawTextShadow("ГОРОД ПАЛ", W / 2, y + 68, "800 48px Inter, Arial", "rgba(255,240,240,0.98)");
    ctx.fillStyle = "rgba(220,230,245,0.92)";
    ctx.font = "600 18px Inter, Arial";
    ctx.fillText(`Счёт: ${score}`, W / 2, y + 122);
    ctx.fillText(`Лучшая оборона: ${best}`, W / 2, y + 150);
    ctx.fillText(`Достигнутая волна: ${wave}`, W / 2, y + 178);
    ctx.fillText(`Перехвачено угроз: ${totalDestroyed}`, W / 2, y + 206);

    const pulse = 0.55 + Math.sin(time * 3) * 0.2;
    ctx.fillStyle = `rgba(140,230,255,${pulse})`;
    ctx.beginPath();
    ctx.roundRect(W / 2 - 100, y + 224, 200, 30, 14);
    ctx.fill();
    ctx.fillStyle = "#021017";
    ctx.font = "800 15px Inter, Arial";
    ctx.fillText("R / ENTER — НОВАЯ ИГРА", W / 2, y + 244);

    ctx.textAlign = "start";
  }

  function drawFlashAndVignette() {
    if (flash > 0.001) {
      ctx.fillStyle = `rgba(255,240,220,${flash})`;
      ctx.fillRect(0, 0, W, H);
    }

    const v = ctx.createRadialGradient(W / 2, H / 2, H * 0.2, W / 2, H / 2, Math.max(W, H) * 0.72);
    v.addColorStop(0, "rgba(0,0,0,0)");
    v.addColorStop(1, "rgba(0,0,0,0.38)");
    ctx.fillStyle = v;
    ctx.fillRect(0, 0, W, H);
  }

  // ---------- Loop ----------
  let last = performance.now();

  function frame(now) {
    let dt = (now - last) / 1000;
    last = now;
    dt = Math.min(dt, 0.033);

    if (state === "title" && mouse.justPressed && !isPortraitPhone()) startGame();

    update(dt);

    drawSky();

    ctx.save();
    const shakeX = (Math.random() - 0.5) * screenShake;
    const shakeY = (Math.random() - 0.5) * screenShake;
    ctx.translate(shakeX, shakeY);
    applyWorldViewTransform();

    drawMountains();
    drawCity();
    drawSmoke();
    drawExplosions();
    drawParticles();
    drawBombs();
    drawDrones();
    drawMissiles();
    drawInterceptors();
    drawShieldDome();
    drawShieldDrones();
    drawRepairDrones();
    drawPowerups();
    drawLauncher();

    ctx.restore();

    drawHUD();
    drawFloatingTexts();
    drawWaveAlert();

    if (state === "title") drawTitle();
    if (paused && state === "playing") drawPause();
    if (state === "gameover") drawGameOver();
    if (isPortraitPhone()) drawOrientationPrompt();

    drawFlashAndVignette();
    if (!pointer.isTouch && !isPortraitPhone()) drawCrosshair();

    mouse.justPressed = false;
    requestAnimationFrame(frame);
  }

  resize();
  initStars();
  initCity();
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
